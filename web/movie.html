<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie</title>
    <link rel="stylesheet" href="/static/css/movie.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <button class="go-back-btn">&#8592;</button>
            <button class="current-movies-btn">Movies</button>
            <button class="soon-movies-btn">Coming soon</button>
            <div class="not-logged">
                <button class="signup-btn">Sign up</button>
                <button class="login-btn">Login</button>
            </div>
            <div class="logged" style="display: none;">
                <button class="profile-btn">Profile</button>
                <button class="logout-btn">Logout</button>
            </div>
        </nav>
    </header>
    <main class="movie-page">
        <section class="movie-details" aria-live="polite"></section>
        <p class="movie-error" role="alert" style="display: none;"></p>
        <div class="movie-projections" style="display: none;"></div>
    </main>
    <script src="/static/js/movie.js" type="module"></script>
</body>
</html>
